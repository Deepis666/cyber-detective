main:
  push:
    - stages:
        - name: build-and-push
          script: |
            docker build -t docker.cnb.cool/vbgame-2026/cyberdetective:latest .
            docker push docker.cnb.cool/vbgame-2026/cyberdetective:latest
      services:
        - docker

$:
  vscode:
    - runner:
        cpus: 16
      services:
        - docker
        - name: vscode
          options:
            onlyPreview: true
            daemon: true
            launch: |
              docker run -d --network host \
                -e PORT=8686 \
                -e CNB_API_ENDPOINT \
                -e CNB_REPO_SLUG \
                -e CNB_TOKEN \
                docker.cnb.cool/vbgame-2026/cyberdetective:latest
            keepAliveTimeout: 3600000
