<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Neon Cyan Favicon for Cyberpunk Detective -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="url(#bg)" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>
  <!-- Magnifying glass / Eye icon -->
  <circle cx="14" cy="14" r="6" fill="none" stroke="#00f0ff" stroke-width="2" filter="url(#glow)"/>
  <line x1="18" y1="18" x2="24" y2="24" stroke="#00f0ff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Center dot -->
  <circle cx="14" cy="14" r="1.5" fill="#ff00e5" filter="url(#glow)"/>
  <!-- Decorative corner -->
  <path d="M 2 8 L 2 2 L 8 2" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
  <path d="M 24 30 L 30 30 L 30 24" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
</svg>
