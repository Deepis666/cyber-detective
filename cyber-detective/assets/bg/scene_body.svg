<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Scene: Surgery Room (scene_body) - Cyberpunk Crime Scene -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="50%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#050508"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-small" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,240,255,0.05)" stroke-width="1"/>
    </pattern>
    <pattern id="hexGrid" width="60" height="52" patternUnits="userSpaceOnUse">
      <path d="M30 0 L60 13 L60 39 L30 52 L0 39 L0 13 Z" fill="none" stroke="rgba(0,240,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#hexGrid)"/>

  <!-- Floor -->
  <rect x="0" y="700" width="1920" height="380" fill="url(#floorGrad)"/>

  <!-- Wall panels -->
  <rect x="100" y="100" width="400" height="500" fill="#0d0d1a" stroke="rgba(0,240,255,0.1)" stroke-width="1"/>
  <rect x="550" y="100" width="400" height="500" fill="#0d0d1a" stroke="rgba(0,240,255,0.1)" stroke-width="1"/>
  <rect x="1000" y="100" width="400" height="500" fill="#0d0d1a" stroke="rgba(0,240,255,0.1)" stroke-width="1"/>
  <rect x="1450" y="100" width="400" height="500" fill="#0d0d1a" stroke="rgba(0,240,255,0.1)" stroke-width="1"/>

  <!-- Surgery chair (center) -->
  <g transform="translate(960, 650)">
    <!-- Chair base -->
    <ellipse cx="0" cy="80" rx="120" ry="30" fill="#141428" stroke="#00f0ff" stroke-width="2" opacity="0.6"/>
    <rect x="-80" y="20" width="160" height="60" fill="#0d0d1a" stroke="rgba(0,240,255,0.3)" stroke-width="1"/>
    <!-- Chair back -->
    <rect x="-60" y="-80" width="120" height="100" rx="10" fill="#141428" stroke="rgba(0,240,255,0.3)" stroke-width="1"/>
    <!-- Head rest -->
    <ellipse cx="0" cy="-90" rx="35" ry="20" fill="#1a1a2e" stroke="#ff00e5" stroke-width="1" opacity="0.5"/>
    <!-- Overhead surgery light -->
    <line x1="0" y1="-200" x2="0" y2="-120" stroke="#555570" stroke-width="4"/>
    <ellipse cx="0" cy="-110" rx="60" ry="15" fill="#e0e0f0" opacity="0.3" filter="url(#glow)"/>
    <!-- Light cone -->
    <polygon points="-60,-110 60,-110 150,50 -150,50" fill="rgba(224,224,240,0.03)"/>
  </g>

  <!-- Scattered tools (left) -->
  <g transform="translate(300, 750)">
    <rect x="0" y="0" width="40" height="8" rx="2" fill="#8888aa" transform="rotate(15)" opacity="0.7"/>
    <rect x="50" y="20" width="30" height="6" rx="2" fill="#00f0ff" transform="rotate(-25)" opacity="0.5"/>
    <circle cx="80" cy="10" r="8" fill="#ff00e5" opacity="0.3"/>
  </g>

  <!-- Terminal screen (right wall) -->
  <g transform="translate(1400, 200)">
    <rect x="0" y="0" width="200" height="150" rx="4" fill="#0a0a12" stroke="#00f0ff" stroke-width="2" filter="url(#glow-small)"/>
    <rect x="10" y="10" width="180" height="130" fill="rgba(0,240,255,0.05)"/>
    <!-- Fake data lines -->
    <line x1="20" y1="30" x2="120" y2="30" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="45" x2="100" y2="45" stroke="#00f0ff" stroke-width="1" opacity="0.3"/>
    <line x1="20" y1="60" x2="140" y2="60" stroke="#ff00e5" stroke-width="1" opacity="0.4"/>
    <line x1="20" y1="75" x2="80" y2="75" stroke="#00f0ff" stroke-width="1" opacity="0.2"/>
    <text x="100" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#00f0ff" opacity="0.4">SYSTEM ERROR</text>
  </g>

  <!-- Neon signs / ambient light -->
  <rect x="200" y="50" width="150" height="4" fill="#00f0ff" filter="url(#glow)" opacity="0.6"/>
  <rect x="1400" y="50" width="150" height="4" fill="#ff00e5" filter="url(#glow)" opacity="0.4"/>
  <rect x="800" y="80" width="100" height="2" fill="#39ff14" filter="url(#glow)" opacity="0.3"/>

  <!-- Vignette overlay -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" style="stop-color:transparent"/>
    <stop offset="100%" style="stop-color:rgba(0,0,0,0.6)"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- Corner HUD elements -->
  <path d="M 20 20 L 80 20 L 80 30" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
  <path d="M 1900 20 L 1840 20 L 1840 30" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
  <path d="M 20 1060 L 80 1060 L 80 1050" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>
  <path d="M 1900 1060 L 1840 1060 L 1840 1050" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5"/>

  <!-- Scanlines overlay -->
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="4" y2="0" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  </pattern>
  <rect width="1920" height="1080" fill="url(#scanlines)" pointer-events="none"/>
</svg>
